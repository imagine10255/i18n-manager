version: '3.8'

services:
  # MySQL 資料庫服務
  mysql:
    image: mysql:8.0
    container_name: i18n-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-i18n_manager}
      MYSQL_USER: ${MYSQL_USER:-i18n}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-i18n_password}
      TZ: 'Asia/Shanghai'
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - i18n-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Node.js 應用服務（開發環境）
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: i18n-app-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER:-i18n}:${MYSQL_PASSWORD:-i18n_password}@mysql:3306/${MYSQL_DATABASE:-i18n_manager}
      VITE_APP_ID: ${VITE_APP_ID:-dev_app_id}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://portal.manus.im}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_key_change_in_production}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-dev_owner}
      OWNER_NAME: ${OWNER_NAME:-Developer}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-https://api.manus.im}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-dev_api_key}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-https://api.manus.im}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-dev_frontend_api_key}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-i18n Manager}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}
    ports:
      - "${APP_PORT:-3000}:3000"
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - i18n-network
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "pnpm drizzle-kit migrate && pnpm dev"
    profiles:
      - dev

  # Node.js 應用服務（生產環境）
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: i18n-app-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-i18n}:${MYSQL_PASSWORD:-i18n_password}@mysql:3306/${MYSQL_DATABASE:-i18n_manager}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      JWT_SECRET: ${JWT_SECRET}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_APP_TITLE: ${VITE_APP_TITLE}
      VITE_APP_LOGO: ${VITE_APP_LOGO}
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - i18n-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - prod

volumes:
  mysql_data:
    driver: local

networks:
  i18n-network:
    driver: bridge
